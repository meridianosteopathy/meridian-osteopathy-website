[build]
  command = "npm run build"
  publish = "_site"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Security headers for every page.
# CSP allows Cloudflare Turnstile + the fonts/images you already use.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; frame-src https://challenges.cloudflare.com https://meridian-osteopathy.au2.cliniko.com https://app.netlify.com https://www.google.com; connect-src 'self' https://challenges.cloudflare.com https://identity.netlify.com https://api.netlify.com; form-action 'self'; base-uri 'self'; object-src 'none'"

# Decap CMS at /admin/* needs a looser CSP: 'unsafe-eval' for Ajv
# schema compilation and unpkg.com on connect-src for source maps.
# Path-specific CSP overrides the global one for matching requests
# only; public pages keep the strict policy above.
[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://challenges.cloudflare.com https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; frame-src https://challenges.cloudflare.com https://meridian-osteopathy.au2.cliniko.com https://app.netlify.com https://www.google.com; connect-src 'self' https://challenges.cloudflare.com https://identity.netlify.com https://api.netlify.com https://unpkg.com; worker-src 'self' blob:; form-action 'self'; base-uri 'self'; object-src 'none'"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Send any traffic hitting the raw Netlify subdomain to the canonical
# domain so Google de-indexes the *.netlify.app URLs. Deploy previews live
# on deploy-preview-N--meridian-osteopathy.netlify.app, so they're not
# affected by this rule.
[[redirects]]
  from = "https://meridian-osteopathy.netlify.app/*"
  to = "https://meridianosteopathy.co.nz/:splat"
  status = 301
  force = true

# Legacy URLs — 301 to the current equivalents. Must appear before the
# catch-all 404 so they're matched first.
[[redirects]]
  from = "/services/sports-rehabilitation/"
  to = "/services/osteopathy/"
  status = 301

[[redirects]]
  from = "/services/medical-acupuncture/"
  to = "/services/acupuncture/"
  status = 301

# Friendly short URLs — handy for print, business cards, verbal referral.
[[redirects]]
  from = "/booking"
  to = "/book/"
  status = 301

[[redirects]]
  from = "/booking/*"
  to = "/book/"
  status = 301

[[redirects]]
  from = "/acupuncture"
  to = "/services/acupuncture/"
  status = 301

[[redirects]]
  from = "/osteopathy"
  to = "/services/osteopathy/"
  status = 301

[[redirects]]
  from = "/about-nina"
  to = "/team/nina-hu/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
